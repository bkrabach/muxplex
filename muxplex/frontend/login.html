<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in — muxplex</title>
  <style>
    :root {
      --bg: #0D1117;
      --surface: #161B22;
      --border: #30363D;
      --text: #E6EDF3;
      --text-muted: #8B949E;
      --accent: #00D9F5;
      --accent-dim: #0096A8;
      --error-bg: #3D1515;
      --error-border: #7A2020;
      --error-text: #FF7B7B;
      --input-bg: #0D1117;
      --radius: 6px;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2rem;
      width: 100%;
      max-width: 360px;
    }

    .login-wordmark {
      text-align: center;
      margin-bottom: 1.5rem;
    }

    .login-wordmark img {
      height: 28px;
    }

    .error-banner {
      display: none;
      background: var(--error-bg);
      border: 1px solid var(--error-border);
      border-radius: var(--radius);
      color: var(--error-text);
      font-size: 0.875rem;
      padding: 0.625rem 0.75rem;
      margin-bottom: 1rem;
    }

    .error-banner.visible {
      display: block;
    }

    .field {
      margin-bottom: 1rem;
    }

    .field label {
      display: block;
      font-size: 0.8125rem;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 0.375rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .field input {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 0.9375rem;
      padding: 0.5rem 0.75rem;
      outline: none;
      transition: border-color 0.15s ease;
    }

    .field input:focus {
      border-color: var(--accent);
    }

    .field-username {
      display: none;
    }

    .field-username.visible {
      display: block;
    }

    .login-btn {
      width: 100%;
      background: var(--accent);
      border: none;
      border-radius: var(--radius);
      color: #0D1117;
      cursor: pointer;
      font-size: 0.9375rem;
      font-weight: 700;
      padding: 0.625rem 1rem;
      margin-top: 0.5rem;
      transition: background 0.15s ease;
    }

    .login-btn:hover {
      background: var(--accent-dim);
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-wordmark">
      <img src="/wordmark-on-dark.svg" alt="muxplex" />
    </div>

    <div id="error-banner" class="error-banner" role="alert" aria-live="assertive">
      Incorrect credentials. Please try again.
    </div>

    <form method="post" action="/login">
      <div class="field field-username" id="username-field">
        <label for="username">Username</label>
        <input
          id="username"
          name="username"
          type="text"
          autocomplete="username"
          placeholder="username"
        />
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input
          id="password"
          name="password"
          type="password"
          autocomplete="current-password"
          placeholder="••••••••"
          required
        />
      </div>

      <button type="submit" class="login-btn">Sign in</button>
    </form>
  </div>

  <script>
    (function () {
      // Auth mode injection point — server sets window.MUXPLEX_AUTH before this script runs.
      // Shape: { mode: 'pam' | 'password', user: string | null }
      var auth = window.MUXPLEX_AUTH || { mode: 'password', user: null };

      // Show username field when auth mode is PAM (requires system username).
      if (auth.mode === 'pam') {
        var usernameField = document.getElementById('username-field');
        if (usernameField) {
          usernameField.classList.add('visible');
        }
      }

      // Show error banner when ?error=1 is present in the URL query string.
      var params = new URLSearchParams(window.location.search);
      if (params.get('error') === '1') {
        var banner = document.getElementById('error-banner');
        if (banner) {
          banner.classList.add('visible');
        }
      }
    })();
  </script>
</body>
</html>
